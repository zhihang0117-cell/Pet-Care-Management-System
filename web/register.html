<html lang="en"><head>
  <meta charset="utf-8">
  <title>Register | Pawfect AI</title>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="index.html"><span class="logo-mark">🐾</span><b>Pawfect AI</b></a>
    </div>
  </header>

  <main class="auth-wrap">
    <section class="auth-card register-wizard">
      <div class="wizard-steps">
        <span class="wizard-step active">1 Account Setup</span>
        <span class="wizard-step">2 Business Configuration</span>
      </div>

      <h2>Register Pet Care Business</h2>
      <p class="muted">Create the business login account. After registration, the business profile configuration page will open.</p>

      <div class="service-choice multi-service" aria-label="Selected business services">
        <label class="choice active">
          <input checked="" name="svc" type="checkbox" value="grooming">
          <strong>Grooming</strong>
          <span>Grooming schedule, service packages and pet notes.</span>
        </label>
        <label class="choice active">
          <input checked="" name="svc" type="checkbox" value="boarding">
          <strong>Boarding / Hotel</strong>
          <span>Room availability, check-in/out and cleaning tasks.</span>
        </label>
        <label class="choice active">
          <input checked="" name="svc" type="checkbox" value="daycare">
          <strong>Daycare</strong>
          <span>Daily attendance, capacity and customer updates.</span>
        </label>
      </div>

      <div class="form-grid">
        <div class="full">
          <label>Business Name</label><span class="req">*</span>
          <input id="reg_business_name" required="" placeholder="e.g. Fresh Paws Studio" value="Fresh Paws Studio">
        </div>
        <div class="full">
          <label>Login Email</label>
          <input id="reg_email" type="email" required="" placeholder="business@email.com" value="new@freshpaws.my">
        </div>
        <div>
          <label>Password <span class="req">*</span></label>
          <input id="reg_password" type="password" required="" minlength="8" placeholder="Minimum 8 characters" oninput="checkPasswordStrength()">
        </div>
        <div>
          <label>Confirm Password <span class="req">*</span></label>
          <input id="reg_confirm" type="password" required="" minlength="8" placeholder="Retype password">
        </div>
        <div class="full">
          <div class="password-meter"><div id="passwordBar"></div></div>
          <p class="small" id="passwordText">Password must be at least 8 characters and both fields must match.</p>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="registerBusinessAccount()">Register</button>
        <a class="btn btn-outline" href="index.html">Back</a>
      </div>
    </section>
  </main>

<script src="index.js"></script>

</body></html>
