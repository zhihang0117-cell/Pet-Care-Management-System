<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pawfect AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="auth-page">

    <!-- Navbar -->
    <header class="auth-header">
        <div class="auth-header-inner">
            <a class="auth-nav-logo" href="index.html">🐾 PAWFECT AI</a>
            <a href="index.html" class="btn btn-secondary" style="padding: 10px 24px; font-size: 0.88rem;">← Back to Site</a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">

            <span class="auth-card-mark">🐾</span>
            <span class="topic-tag">Welcome Back</span>
            <h1>Login to your account</h1>
            <p class="auth-subtitle">Enter your credentials to access the Pawfect AI management portal.</p>

            <div class="form-stack">
                <div class="form-group">
                    <label for="login_email">Email <span class="req">*</span></label>
                    <input id="login_email" type="email" autocomplete="email" placeholder="manager@happypaws.my" required>
                </div>
                <div class="form-group">
                    <label for="login_password">Password <span class="req">*</span></label>
                    <input id="login_password" type="password" autocomplete="current-password" placeholder="Minimum 8 characters" required>
                </div>
            </div>

            <div class="auth-actions">
                <button class="btn btn-primary" type="button" onclick="loginPawfectAccount()">Login</button>
            </div>

            <p class="auth-switch">
                Don't have an account? <a href="register.html">Register your business</a>
            </p>

        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
