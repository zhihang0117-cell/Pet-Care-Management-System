<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <a class="logo" href="index.html"><span class="logo-mark">🐾</span><b>Pawfect AI</b></a>
</head>
<main>
    <h2>Login to Pawfect AI system</h2>
    <p class="hint">Enter your email and password. Incorrect password will be denied and cannot enter the website.</p>

    <div class="form-grid single-column">
        <div class="full"><label>Email<span class="req">*</span></label><input id="login_email" type="email" autocomplete="email" placeholder="manager@happypaws.my" required></div>
        <div class="full"><label>Password<span class="req">*</span></label><input id="login_password" type="password" autocomplete="current-password" placeholder="Minimum 8 characters" required></div>
      </div>
    <div class="actions">
        <button class="btn btn-primary" type="button" onclick="loginPawfectAccount()">Login</button>
        <a class="btn btn-outline" href="index.html">Back</a>
      </div>
</main>
<script src="index.js"></script>
</html>
